
<!DOCTYPE html>
<html>
<head>
    <title>Data Entry</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; }
        .box { width: 300px; margin: 80px auto; padding: 20px; background: #fff; }
        input, select, button { width: 100%; margin: 8px 0; padding: 8px; }
        .msg { text-align: center; margin-top: 10px; }
        .a { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="box">
    <h3>Attendance</h3>
    <form method="post">
        <input type="text" name="roll" placeholder="Roll Number" required>
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="email" name="email" placeholder="xxxxxxx@gmail.com" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <button type="submit">Submit</button>
    </form>
    <div class="msg">{{ message }}</div>
    <div class="a"><a href="/">back page</a></div>
</div>
</body>
</html>
