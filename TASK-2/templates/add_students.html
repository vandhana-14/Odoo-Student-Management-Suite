<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_students.css') }}">
    <title>Collage Management System</title>
</head>
<body>

<!-- ================= HEADER ================= -->
<div class="container">
    <div class="logo" style="background-image: url('{{ url_for('static', filename='images/logo.png') }}');"></div>
    <h1 class="h1">Collage Name</h1>
    <nav class="navbar">
        <a href="/">Home</a>
        <a href="/view_students">Students List</a>
        <a href="/add_students">Add Students</a>
        <a href="/attendance">Attendance Entry</a>
    </nav>
</div>

<div class="image" style="background-image: url('{{ url_for('static', filename='images/image.jpg') }}');" alt="Banner">
    <h2 class="image_text">Collage Student Entry Form</h2>
</div>

<!-- ================= FLASH POPUP ================= -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div id="flash-popup">
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<!-- ================= FORM ================= -->
<form method="post" enctype="multipart/form-data" id="addStudentForm">

  <div class="form-row">
    <label>Full Name :</label>
    <input type="text" name="name" id="name" required>
    <small class="error"></small>
  </div><hr>

  <div class="form-row dob">
    <label>Date of Birth :</label>
    <select id="year" name="year"><option value="">Year</option></select>
    <select id="month" name="month"><option value="">Month</option></select>
    <select id="day" name="day"><option value="">Day</option></select>
    <small class="error"></small>
  </div><hr>

  <div class="form-row">
    <label>Student ID :</label>
    <input type="text" name="student_id" id="student_id" required>
    <small class="error"></small>
  </div><hr>

  <div class="form-row">
    <label>Email :</label>
    <input type="email" name="email" id="email" required>
    <small class="error"></small>
  </div><hr>

  <div class="form-row">
    <label>Phone Number :</label>
    <input type="tel" name="phone" id="phone">
    <small class="error"></small>
  </div><hr>

  <div class="form-row">
    <label>Address :</label>
    <input type="text" name="address" id="address" style="height: 100px;">
  </div><hr>

  <div class="form-row">
    <label>Selected Course :</label>
    <select name="course" id="course" required>
      <option value="" disabled selected hidden>Select Course</option>
      {% for d in departments %}
        <option value="{{ d[0] }}"
          {% if request.args.get('course') == d[0] %}selected{% endif %}>
          {{ d[0] }}
        </option>
      {% endfor %}
    </select>
    <small class="error"></small>
  </div><hr>

  <div class="form-row">
    <label>Upload Resume:</label>
    <input type="file" name="document" id="document">
    <small class="error"></small>
  </div>

  <div class="form-row buttons">
    <button type="submit" class="submit-btn">Submit</button>
    <button type="reset" class="reset-btn">Reset</button>
  </div>

</form>


<script src="{{ url_for('static', filename='js/add_students.js') }}" defer></script>

</body>
</html>
